<section class="ajax-page">

    <p class="eyebrow">
        THREE SMALL GIFTS
    </p>

    <h1 class="page-title">
        Pick a
        <em>gift</em>
    </h1>

    <p class="page-subtitle">
        You can open all three.
        I will not stop you.
    </p>


    <div class="gift-buttons">

        <button
            class="gift-button"
            data-gift="one"
        >
            <span>💌</span>

            <b>
                Gift One
            </b>

            <small>
                a reminder
            </small>
        </button>


        <button
            class="gift-button"
            data-gift="two"
        >
            <span>🏆</span>

            <b>
                Gift Two
            </b>

            <small>
                an award
            </small>
        </button>


        <button
            class="gift-button"
            data-gift="three"
        >
            <span>✨</span>

            <b>
                Gift Three
            </b>

            <small>
                a promise
            </small>
        </button>

    </div>


    <div
        id="giftResult"
        class="gift-result"
    ></div>

</section>
