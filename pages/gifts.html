<section class="ajax-page">

    <p class="eyebrow">
        JUST ONE SMALL REQUEST 💌
    </p>

    <h1 class="page-title">
        I Need
        <em>Your Reply</em>
    </h1>

    <p class="page-subtitle">
        Please answer honestly. ❤️
    </p>

    <div class="gift-buttons">

        <!-- Chicken Biryani -->
        <button
            id="giftBiryani"
            class="gift-button"
        >
            <span>🍗</span>

            <b>Chicken Biryani</b>

            <small>
                Tap to answer ❤️
            </small>
        </button>


        <!-- Chocolate -->
        <button
            id="giftChocolate"
            class="gift-button"
        >
            <span>🍫</span>

            <b>Dairy Milk Silk</b>

            <small>
                Tap to answer 🍫
            </small>
        </button>


        <!-- Offline Gift -->
        <button
            id="giftOffline"
            class="gift-button"
        >
            <span>🎁</span>

            <b>Offline Gift</b>

            <small>
                Tap to answer 🎀
            </small>
        </button>

    </div>


    <!-- Dynamic Reply Box -->

    <div
        id="giftContent"
        class="gift-content"
    >

        <div class="reply-card">

            <div class="chat-message">

                <div class="chat-avatar">
                    👦
                </div>

                <div class="chat-bubble">

                    <h3>
                        Hey...
                    </h3>

                    <p>
                        Choose one of the gifts above.
                        I'll ask you something special. ❤️
                    </p>

                </div>

            </div>

        </div>

    </div>

</section>
